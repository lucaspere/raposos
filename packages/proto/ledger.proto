syntax = "proto3";

package ledger;

service LedgerService {
  rpc ReserveOfframp (ReserveOfframpRequest) returns (ReserveOfframpResponse);
  rpc FinalizeOfframp (FinalizeOfframpRequest) returns (FinalizeOfframpResponse);
}

message ReserveOfframpRequest {
  string contractor_id = 1;
  string amount = 2; // Decimal as string to preserve precision
}

message ReserveOfframpResponse {
  bool success = 1;
  string transaction_id = 2; // UUID as string
  string error_message = 3;
}

message FinalizeOfframpRequest {
  string transaction_id = 1;
  bool success = 2; // If false, the reservation is released via a reversal event.
  string tx_hash = 3; // PIX transaction ID / hash
}

message FinalizeOfframpResponse {
  bool success = 1;
  string error_message = 2;
}
