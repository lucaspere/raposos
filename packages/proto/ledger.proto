syntax = "proto3";

package ledger;

service LedgerService {
  rpc LockFunds (LockFundsRequest) returns (LockFundsResponse);
  rpc ConfirmOfframp (ConfirmOfframpRequest) returns (ConfirmOfframpResponse);
}

message LockFundsRequest {
  string contractor_id = 1;
  string amount = 2; // Decimal as string to preserve precision
}

message LockFundsResponse {
  bool success = 1;
  string transaction_id = 2; // UUID as string
  string error_message = 3;
}

message ConfirmOfframpRequest {
  string transaction_id = 1;
  bool success = 2; // If false, the lock is released (FAILED)
  string tx_hash = 3; // PIX transaction ID / hash
}

message ConfirmOfframpResponse {
  bool success = 1;
  string error_message = 2;
}
